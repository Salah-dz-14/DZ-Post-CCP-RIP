    <meta charset="UTF-8">

    <!-- PWA Meta Elements -->
    <meta name="theme-color" content="#003366">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

</head>
<body class="bg-gray-50 text-gray-900">
    <div id="root"></div>
<script type="module" src="/index.tsx"></script>
<script>
    if ('serviceWorker' in navigator) {
        const isDev = window.location.hostname === 'localhost' || 
                      window.location.hostname === '127.0.0.1' || 
                      window.location.hostname.includes('-dev-') ||
                      window.location.port !== '';

        if (isDev) {
            // Unregister any active service workers in development to prevent stale caching issues
            navigator.serviceWorker.getRegistrations().then((registrations) => {
                for (let registration of registrations) {
                    registration.unregister().then((success) => {
                        if (success) {
                            console.log('[PWA] Unregistered service worker in dev mode to prevent caching issues.');
                        }
                    });
                }
            });
        } else {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/sw.js')
                    .then((reg) => {
                        console.log('[PWA] Service Worker registered successfully:', reg.scope);
                    })
                    .catch((err) => {
                        console.error('[PWA] Service Worker registration failed:', err);
                    });
            });
        }
    }
</script>
</body>
</html>
